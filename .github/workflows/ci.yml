name: SmartLearn AI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smartlearn-backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Verify Backend Syntax
      run: |
        python -m compileall .
    # Uncomment the following lines when you add pytest tests later
    # - name: Run Backend Tests
    #   run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smartlearn-frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './smartlearn-frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci || npm install
    - name: Build Frontend
      run: npm run build
      env:
        CI: false # Prevents strict warning errors from crashing the build during CI
